plugins {
    id 'com.android.application'
}

android {
    namespace 'com.kawashirosoftware.JellyLEDControl'
    compileSdk 30
    defaultConfig {
        applicationId "com.kawashirosoftware.JellyLEDControl"
        minSdk 24
        targetSdk 30
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.3.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.1'
}
